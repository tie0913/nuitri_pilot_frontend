name: nuitri_pilot_frontend
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  image_picker: ^1.0.7

  cupertino_icons: ^1.0.8

  # Networking layer
  dio: ^5.5.0

  # Date formatter
  intl: ^0.19.0

  email_validator: ^3.0.0
  http_parser: ^4.1.2
  path: ^1.9.1

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

  flutter_test:
    sdk: flutter

  # ✅ Required for widget tests
  flutter_lints: ^5.0.0

  # ✅ Mocking library for frontend tests
  mocktail: ^1.0.4

  # ✅ Required for integration tests
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

flutter_native_splash:
  color: "#F7F8FA"
  image: assets/images/logo.png
  android_12:
    color: "#F7F8FA"
    image: assets/images/logo.png"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#F7F8FA"
  adaptive_icon_foreground: "assets/images/logo.png"